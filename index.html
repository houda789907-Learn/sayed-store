
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر الملابس الأنيقة</title>
    <style>
        /* تنسيقات بسيطة وسريعة للموقع */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
            color: #333;
        }
        header {
            background-color: #111;
            color: #fff;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 20px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }
        .product-card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            width: 300px;
            margin: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            overflow: hidden;
        }
        .product-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }
        .product-info {
            padding: 15px;
        }
        .price {
            color: #e44d26;
            font-weight: bold;
            font-size: 1.2em;
        }
        .btn {
            background-color: #111;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:hover {
            background-color: #444;
        }
    </style>
</head>
<body>

    <header>
        <h1>متجر الملابس الحديثة 👕👗</h1>
        <p>أحدث الصيحات بأفضل الأسعار</p>
    </header>

    <div class="container">
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=500" alt="تيشيرت كلاسيك">
            <div class="product-info">
                <h3>تيشيرت كلاسيك قطن</h3>
                <p class="price">150 جنيه</p>
                <button class="btn">إضافة للسلة</button>
            </div>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1596755094514-f87e34085b2c?w=500" alt="قميص كاجوال">
            <div class="product-info">
                <h3>قميص كاجوال أنيق</h3>
                <p class="price">280 جنيه</p>
                <button class="btn">إضافة للسلة</button>
            </div>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1541099649105-f69ad21f3246?w=500" alt="بنطلون جينز">
            <div class="product-info">
                <h3>بنطلون جينز عصري</h3>
                <p class="price">350 جنيه</p>
                <button class="btn">إضافة للسلة</button>
            </div>
        </div>
    </div>

</body>
</html>
